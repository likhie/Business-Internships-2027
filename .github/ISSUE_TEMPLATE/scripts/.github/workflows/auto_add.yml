name: Auto Add Internship to README

on:
  issues:
    types: [opened]

jobs:
  update-readme:
    if: contains(github.event.issue.labels.*.name, 'internship-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update README
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/add_entry.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Auto-add new internship posting from Issue #${{ github.event.issue.number }}" || exit 0
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v2
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Thanks! This internship has been automatically added to the main README."
