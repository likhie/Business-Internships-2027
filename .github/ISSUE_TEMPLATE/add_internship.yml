name: 💼 Submit a Business Internship
description: Add a new business, sales, marketing, or product internship to the list.
title: "[ADD]: "
labels: ["internship-submission"]
body:
  - type: input
    id: company
    attributes:
      label: Company Name
      placeholder: "e.g., Salesforce, Red Bull, Capital One"
    validations:
      required: true
  - type: input
    id: role
    attributes:
      label: Internship Role Title
      placeholder: "e.g., Product Management Intern, Marketing Intern"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Industry Category
      options:
        - Product Management
        - Marketing & Growth
        - Sales & Business Development
        - Strategy, Analytics & Operations
        - MBA & Graduate
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      placeholder: "e.g., New York, NY / Remote / Hybrid"
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Direct Application Link
      placeholder: "https://..."
    validations:
      required: true
